# coturn config for shaman.golden-horde.ir (NO SSL)
listening-port=3478
tls-listening-port=5349

# External IP required when not using host networking
# Replace with your server's PUBLIC IP address
# external-ip=194.60.231.201

realm=shaman.golden-horde.ir
server-name=shaman.golden-horde.ir

# Simple shared-secret authentication
use-auth-secret
static-auth-secret=qwer123456

# Relay port range (must match published ports in compose file)
min-port=50000
max-port=50050

# Disable TLS/DTLS completely
no-tls
no-dtls

# Logging
verbose
